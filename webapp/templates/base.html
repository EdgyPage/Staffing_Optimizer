<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Staffing Optimizer{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/app.css">
  {% block head %}{% endblock %}
</head>
<body>
  <header class="topbar">
    <span class="brand">Staffing&nbsp;Optimizer</span>
    <nav>
      <a href="/builder" class="{{ 'active' if active == 'builder' else '' }}">Builder</a>
      <a href="/designs" class="{{ 'active' if active == 'designs' else '' }}">Saved&nbsp;designs</a>
    </nav>
  </header>
  <main>{% block content %}{% endblock %}</main>
  <script src="/static/js/common.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
